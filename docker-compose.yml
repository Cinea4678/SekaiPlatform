services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sekai_platform}
      POSTGRES_USER: ${POSTGRES_USER:-sekai_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sekai_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}"
      CLI_JAVA_OPTS: "${ELASTICSEARCH_CLI_JAVA_OPTS:-}"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  api-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/api-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sekai_platform};Username=${POSTGRES_USER:-sekai_platform};Password=${POSTGRES_PASSWORD:-sekai_platform}"
      Elasticsearch__Url: "http://elasticsearch:9200"
      InternalServices__AuthService: "http://auth-service:8080"
      InternalServices__AssetService: "http://asset-service:8080"
      InternalServices__SearchService: "http://search-service:8080"
      Jwt__Issuer: ${JWT_ISSUER:-sekai-platform}
      Jwt__Audience: ${JWT_AUDIENCE:-sekai-platform}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-replace-with-local-development-signing-key}
      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE:-true}
      Database__Seed: ${DATABASE_SEED:-true}
      Database__SeedUsers__AdminPassword: ${SEED_ADMIN_PASSWORD:-}
      Database__SeedUsers__TestPassword: ${SEED_TEST_PASSWORD:-}
    ports:
      - "${API_SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  auth-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sekai_platform};Username=${POSTGRES_USER:-sekai_platform};Password=${POSTGRES_PASSWORD:-sekai_platform}"
      Jwt__Issuer: ${JWT_ISSUER:-sekai-platform}
      Jwt__Audience: ${JWT_AUDIENCE:-sekai-platform}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-replace-with-local-development-signing-key}
    depends_on:
      postgres:
        condition: service_healthy

  asset-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/asset-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sekai_platform};Username=${POSTGRES_USER:-sekai_platform};Password=${POSTGRES_PASSWORD:-sekai_platform}"
      InternalServices__SearchService: "http://search-service:8080"
      Jwt__Issuer: ${JWT_ISSUER:-sekai-platform}
      Jwt__Audience: ${JWT_AUDIENCE:-sekai-platform}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-replace-with-local-development-signing-key}
    depends_on:
      postgres:
        condition: service_healthy
      search-service:
        condition: service_started

  search-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Elasticsearch__Url: "http://elasticsearch:9200"
      Jwt__Issuer: ${JWT_ISSUER:-sekai-platform}
      Jwt__Audience: ${JWT_AUDIENCE:-sekai-platform}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-replace-with-local-development-signing-key}
    depends_on:
      elasticsearch:
        condition: service_started

  sync-worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/sync-worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sekai_platform};Username=${POSTGRES_USER:-sekai_platform};Password=${POSTGRES_PASSWORD:-sekai_platform}"
      InternalServices__SearchService: "http://search-service:8080"
    depends_on:
      postgres:
        condition: service_healthy
      search-service:
        condition: service_started

volumes:
  postgres-data:
  elasticsearch-data:
