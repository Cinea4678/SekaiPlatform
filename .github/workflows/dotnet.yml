# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sekai_platform
          POSTGRES_USER: sekai_platform
          POSTGRES_PASSWORD: sekai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sekai_platform -d sekai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__Postgres: Host=localhost;Port=5432;Database=sekai_platform;Username=sekai_platform;Password=sekai_platform
      SEKAI_INTEGRATION_TEST_POSTGRES: Host=localhost;Port=5432;Database=sekai_platform;Username=sekai_platform;Password=sekai_platform

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore SekaiPlatform.sln
    - name: Build
      run: dotnet build SekaiPlatform.sln --no-restore -v minimal
    - name: Test
      run: dotnet test tests/integration-tests/SekaiPlatform.IntegrationTests.csproj --no-build -v normal -nr:false
